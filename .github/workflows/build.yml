name: Build

on:
    workflow_dispatch:
        inputs:
            img_tag:
                description: Docker Image Tag
            ref:
                description: Revision or Branch to build
                default: main
            push_latest:
                description: Set True if the build is for the latest version
                type: boolean
                required: false
                default: false
            platforms:
                description: Platforms to build for
                type: choice
                default: linux/amd64
                options:
                - linux/amd64,linux/arm64
                - linux/amd64
                - linux/arm64
            rebuild:
                description: Rebuild this image?
                type: boolean
                default: false

jobs:
    build-image:
        name: Build Image
        uses: hathitrust/github_actions/.github/workflows/build.yml@3064ae06d0c0f8b10161ea944178d494f1141f0d
        with:
          image: ghcr.io/${{ github.repository }}
          dockerfile: Dockerfile
          img_tag: ${{ inputs.img_tag }}
          tag: ${{ inputs.ref }}
          push_latest: ${{ inputs.push_latest}}
          rebuild: ${{ inputs.rebuild }}
          platforms: ${{ inputs.platforms }}
        permissions:
            contents: read
            packages: write
        secrets: inherit
